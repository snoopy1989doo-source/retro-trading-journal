*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#020208;color:#eee;

}

::-webkit-scrollbar-thumb{background:#ff00aa}

/* 📺 CRT MONITOR LAYER EFFECT */
.crt{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(rgba(0,0,0,0)50%,rgba(0,255,255,.03)50%);

}
.crt.disabled { display: none; }

/* Mechanical Glowing Cards */

  border:3px outset #ff00aa;background:#090514;
  padding:12px;margin-bottom:14px;
  box-shadow: 0 0 15px rgba(255, 0, 170, 0.3);
}
.card-title{
  background:linear-gradient(90deg,#440088,#ff00aa);
  color:#fff;padding:6px 12px;
  margin:-12px -12px 12px;

  text-shadow:2px 2px 0 #000;

/* Alert Flashing Banner */

  border:3px outset #ff0033;background:#26000c;
  padding:12px;margin-bottom:14px;

  box-shadow: 0 0 15px #ff0033;
}
.alert-title{
  color:#ff0033;font-size:10px;
  animation:blink .7s infinite;
  margin-bottom:6px;
  text-shadow: 0 0 5px #ff0033;
}
.alert-sub{color:#ffaa00;font-size:8px}

.nav-btn{flex:1;padding:12px 4px 8px;text-align:center;border:none;background:transparent;font-family:inherit;font-size:7px;color:#556;cursor:pointer;}

function load(key, def) {
  try { const v=localStorage.getItem(key); return v!==null?JSON.parse(v):def; }
  catch { return def; }
} //[cite: 1]
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} } //[cite: 1]

function beep(type) {
  if (!state.sound) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
    const ctx=new AC(), osc=ctx.createOscillator(), g=ctx.createGain(); osc.connect(g); g.connect(ctx.destination);
    if (type==='win') {
      osc.type='square'; osc.frequency.setValueAtTime(523,ctx.currentTime); osc.frequency.setValueAtTime(659,ctx.currentTime+.09);
      g.gain.setValueAtTime(.07,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
      osc.start(); osc.stop(ctx.currentTime+.3);
    } else if (type==='lose') {
      osc.type='sawtooth'; osc.frequency.setValueAtTime(220,ctx.currentTime); osc.frequency.linearRampToValueAtTime(100,ctx.currentTime+.5);
      g.gain.setValueAtTime(.08,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
      osc.start(); osc.stop(ctx.currentTime+.5);
    } else if (type==='alert') {
      osc.type='sawtooth'; osc.frequency.setValueAtTime(400,ctx.currentTime); osc.frequency.linearRampToValueAtTime(800,ctx.currentTime+.2); osc.frequency.linearRampToValueAtTime(400,ctx.currentTime+.4);
      g.gain.setValueAtTime(.1,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
      osc.start(); osc.stop(ctx.currentTime+.4);
    } else {
      osc.type='triangle'; osc.frequency.setValueAtTime(600,ctx.currentTime); g.gain.setValueAtTime(.04,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.06);
      osc.start(); osc.stop(ctx.currentTime+.06);
    }
  } catch {}
} //[cite: 1]

function today() { return new Date().toISOString().split('T')[0]; } //[cite: 1]
function fmt(n,d=2) { return Number(n).toFixed(d); } //[cite: 1]
function fmtDate(s) { if (!s) return ''; const [y,m,d]=s.split('-'); return `${d}/${m}/${y.slice(2)}`; } //[cite: 1]
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); } //[cite: 1]

function weekStart(dateStr) { const d=new Date(dateStr); const day=d.getDay(); const diff=day===0?-6:1-day; d.setDate(d.getDate()+diff); return d.toISOString().split('T')[0]; } //[cite: 1]
function weekEnd(dateStr) { const ws=weekStart(dateStr); const d=new Date(ws); d.setDate(d.getDate()+6); return d.toISOString().split('T')[0]; } //[cite: 1]
function monthStart(dateStr) { return dateStr.slice(0,7)+'-01'; } //[cite: 1]
function monthEnd(dateStr) { const [y,m]=dateStr.split('-'); const last=new Date(+y, +m, 0); return `${y}-${m}-${String(last.getDate()).padStart(2,'0')}`; } //[cite: 1]

function filterByPeriod(trades, period) {
  if (!period || period.mode==='all') return trades;
  const t=today();
  if (period.mode==='daily') { return trades.filter(tr=>tr.date===(period.date||t)); }
  if (period.mode==='weekly') { return trades.filter(tr=>tr.date>=weekStart(t)&&tr.date<=weekEnd(t)); }
  if (period.mode==='monthly') { return trades.filter(tr=>tr.date>=monthStart(t)&&tr.date<=monthEnd(t)); }
  if (period.mode==='custom') { return trades.filter(tr=>tr.date>=(period.from||'')&&tr.date<=(period.to||'9999-12-31')); }
  return trades;
} //[cite: 1]

// ─── 📊 ADVANCED STATS CALCULATION CORE (Multi-Account Compliant) ─────────
function computeStats(trades, startBal) {
  const total=trades.length;
  const wins=trades.filter(t=>t.status==='TP').length;
  const loses=trades.filter(t=>t.status==='SL').length;
  const bes=trades.filter(t=>t.status==='BE').length;
  const wr=total>0?(wins/total*100).toFixed(1):0;
  const netPnl=trades.reduce((s,t)=>s+t.pnl,0);

  function calcRR(t) {
    const entryExitDist = Math.abs(t.entry - t.exit); const entrySLDist   = Math.abs(t.entry - t.sl);
    if (entryExitDist === 0 || entrySLDist === 0 || t.lot === 0) return null;
    const pipVal = Math.abs(t.pnl) / (entryExitDist * t.lot);
    const riskUSD   = entrySLDist * t.lot * pipVal; const rewardUSD = Math.abs(t.pnl);
    return riskUSD > 0 ? rewardUSD / riskUSD : null;
  } //[cite: 1]

  const rrs    = trades.map(calcRR).filter(r=>r!==null&&r>0);
  const winRRs = trades.filter(t=>t.status==='TP').map(calcRR).filter(r=>r!==null&&r>0);
  const loseRRs= trades.filter(t=>t.status==='SL').map(calcRR).filter(r=>r!==null&&r>0);
  const avgRR    = rrs.length>0    ? (rrs.reduce((a,b)=>a+b,0)/rrs.length).toFixed(2)+'R' : '-';
  const highWinRR= winRRs.length>0 ? Math.max(...winRRs).toFixed(2)+'R' : '-';
  const highLoseRR=loseRRs.length>0? Math.max(...loseRRs).toFixed(2)+'R': '-';

  // 1. PROFIT FACTOR ENGINE
  const grossProfit = trades.filter(t=>t.pnl > 0).reduce((s,t)=>s+t.pnl, 0);
  const grossLoss = Math.abs(trades.filter(t=>t.pnl < 0).reduce((s,t)=>s+t.pnl, 0));
  const profitFactor = grossLoss > 0 ? (grossProfit / grossLoss).toFixed(2) : (grossProfit > 0 ? '∞' : '0.00');

  // 2. EXPECTANCY ENGINE
  const expectancy = total > 0 ? (netPnl / total).toFixed(2) : '0.00';

  // 3. PSYCHOLOGY REVENUE LEAK ENGINE (คำนวณเฉพาะไม้ที่ Loss)
  const lossTrades = trades.filter(t=>t.pnl < 0);
  const greedCost = Math.abs(lossTrades.filter(t=>t.psychology && t.psychology.greed).reduce((s,t)=>s+t.pnl, 0));
  const fearCost = Math.abs(lossTrades.filter(t=>t.psychology && t.psychology.fear).reduce((s,t)=>s+t.pnl, 0));

  return {total,wins,loses,bes,wr,netPnl,avgRR,highWinRR,highLoseRR,profitFactor,expectancy,greedCost,fearCost};
}

const state = {

function initCloudDatabase() {

    if (data) {

function buildTradeForm() {

  return `

    </div>
    <label>Timeframe</label><select id="f-tf">${tfs.map(t=>`<option ${f.tf===t?'selected':''}>${t}</option>`).join('')}</select>
    <label>Entry Price (ราคาเข้า)</label><input type="number" id="f-entry" placeholder="0.00" value="${f.entry}" inputmode="decimal">

function buildEquityCurve(trades) {
  if (trades.length < 2) return `<div class="empty" style="margin-top:12px">เพิ่มประวัติการเทรดเพื่อสร้างสายกราฟพอร์ต</div>`;
  const sorted=[...trades].sort((a,b)=>a.date.localeCompare(b.date)); let cum=0; const points=sorted.map(t=>{ cum+=t.pnl; return cum; }); const maxV=Math.max(...points,0); const minV=Math.min(...points,0); const range=maxV-minV||1; const W=300,H=110,PL=4,PR=4,PT=8,PB=20; const IW=W-PL-PR, IH=H-PT-PB;
  const pts=points.map((v,i)=>{ const x=PL+(i/(points.length-1||1))*IW; const y=PT+IH-((v-minV)/range)*IH; return `${x.toFixed(1)},${y.toFixed(1)}`; }).join(' ');
  const zeroY=(PT+IH-((0-minV)/range)*IH).toFixed(1);
  return `
    <div style="margin-top:12px;color:#666;font-size:7px;margin-bottom:4px">📈 EQUITY GROWTH TRAJECTORY</div>
    <div style="overflow-x:auto">
      <svg width="${W}" height="${H}" style="display:block;background:#03020a;border:2px inset #ff00aa">
        <line x1="${PL}" y1="${zeroY}" x2="${W-PR}" y2="${zeroY}" stroke="#221133" stroke-width="1" stroke-dasharray="4,3"/>
        <polyline points="${pts}" fill="none" stroke="#00ffff" stroke-width="2"/>
      </svg>
    </div>`;
} //[cite: 1]

function buildPieChart(st) {
  const total=st.wins+st.loses+st.bes;
  if (total===0) return `<div class="empty" style="margin-top:12px">ไม่มีข้อมูลเรนเดอร์อัตราส่วนสถิติ</div>`;
  const cx=60,cy=60,r=50;
  const slices=[
    {label:'Win', val:st.wins, color:'#00ff66'},
    {label:'BE',  val:st.bes,  color:'#ffff00'},
    {label:'Lose',val:st.loses,color:'#ff0055'},
  ].filter(s=>s.val>0);
  let paths=''; let startAngle=-Math.PI/2;
  slices.forEach(s=>{
    const angle=(s.val/total)*Math.PI*2; const endAngle=startAngle+angle;
    const x1=cx+r*Math.cos(startAngle); const y1=cy+r*Math.sin(startAngle);
    const x2=cx+r*Math.cos(endAngle); const y2=cy+r*Math.sin(endAngle);
    const large=angle>Math.PI?1:0;
    if (slices.length===1) { paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${s.color}" opacity="0.85"/>`; }
    else { paths+=`<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${s.color}" opacity="0.85" stroke="#000" stroke-width="1"/>`; }
    startAngle=endAngle;
  }); //[cite: 1]
  const legend=[{label:'Win', pct:st.wins, color:'#00ff66'},{label:'BE', pct:st.bes, color:'#ffff00'},{label:'Lose',pct:st.loses, color:'#ff0055'}];
  return `
    <div style="margin-top:12px;color:#666;font-size:7px;margin-bottom:4px">🥧 ACTION WIN/BE/LOSE RATIO</div>
    <div class="pie-wrap">
      <svg width="120" height="120" style="flex-shrink:0">${paths}</svg>
      <div class="pie-legend">
        ${legend.map(l=>`
          <div class="pie-legend-item">
            <div class="pie-dot" style="background:${l.color}"></div>
            <span style="color:#aaa">${l.label}</span>
            <span style="color:#fff">${l.pct} <span style="color:#555">(${total>0?(l.pct/total*100).toFixed(0):0}%)</span></span>
          </div>`).join('')}
      </div>
    </div>`;
} //[cite: 1]

  ['cf-date','cf-amount','cf-desc'].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('input',e=>{ if(id==='cf-date') state.cf.date=e.target.value; if(id==='cf-amount') state.cf.amount=e.target.value; if(id==='cf-desc') state.cf.desc=e.target.value; }); }); //[cite: 1]

  const fltAcc=document.getElementById('flt-account'); if(fltAcc) fltAcc.addEventListener('change',e=>{ state.filter.account=e.target.value; render(); }); //[cite: 1]
  const fltSym=document.getElementById('flt-symbol'); if(fltSym) fltSym.addEventListener('change',e=>{ state.filter.symbol=e.target.value; render(); }); //[cite: 1]
  const fltSt=document.getElementById('flt-status'); if(fltSt) fltSt.addEventListener('change',e=>{ state.filter.status=e.target.value; render(); }); //[cite: 1]
  
  const statsAcc=document.getElementById('stats-account'); if(statsAcc) statsAcc.addEventListener('change',e=>{ state.statsPeriod.account=e.target.value; render(); }); //[cite: 1]

  bindPeriodFilter('log', state.filter.period, (p)=>{ state.filter.period=p; render(); }); //[cite: 1]
  bindPeriodFilter('stats', state.statsPeriod, (p)=>{ state.statsPeriod=p; render(); }); //[cite: 1]

  const btnTrade=document.getElementById('btn-add-trade');
  if(btnTrade) btnTrade.addEventListener('click',()=>{
    const f=state.f; if(!f.entry||!f.exit||!f.sl||!f.lot||f.pnl===''){ alert('กรอกตัวเลขราคาและหลอดให้ครบถ้วนก่อนส่งข้อมูล!'); return; } //[cite: 1]
    state.trades.push({id:uid(), date:f.date, symbol:f.symbol, dir:f.dir, entry:parseFloat(f.entry)||0, exit:parseFloat(f.exit)||0, sl:parseFloat(f.sl)||0, lot:parseFloat(f.lot)||0, pnl:parseFloat(f.pnl)||0, status:f.status, tf:f.tf, psychology:{conf:f.conf, fear:f.fear, greed:f.greed}, account:f.account}); //[cite: 1]
    save(KEY.TRADES, state.trades); syncToCloud(); //[cite: 1]
    if(f.status==='TP') beep('win'); else if(f.status==='SL') beep('lose'); else beep('click'); //[cite: 1]
    state.f={...state.f,entry:'',exit:'',sl:'',lot:'',pnl:'',status:'TP',conf:false,fear:false,greed:false}; render(); //[cite: 1]
  });

  const btnCF=document.getElementById('btn-add-cf');
  if(btnCF) btnCF.addEventListener('click',()=>{
    const cf=state.cf; if(!cf.amount||parseFloat(cf.amount)<=0){ alert('ระบุจำนวนเงินสดเป็นตัวเลขด้วย!'); return; } //[cite: 1]
    state.cfs.push({id:uid(),date:cf.date,type:cf.type,amount:parseFloat(cf.amount),desc:cf.desc,account:cf.account}); //[cite: 1]
    save(KEY.CFS, state.cfs); syncToCloud(); beep('win'); //[cite: 1]
    state.cf={date:today(),type:'Deposit',amount:'',desc:'',account:'Demo'}; render(); //[cite: 1]
  });

  document.querySelectorAll('[data-del-trade]').forEach(el=>{ el.addEventListener('click',()=>{ if(!confirm('ยืนยันลบประวัติไม้เทรดนี้ถาวร?')) return; state.trades=state.trades.filter(t=>t.id!==el.dataset.delTrade); save(KEY.TRADES, state.trades); syncToCloud(); render(); }); }); //[cite: 1]
  document.querySelectorAll('[data-del-cf]').forEach(el=>{ el.addEventListener('click',()=>{ if(!confirm('ลบรายการกระแสเงินสดนี้?')) return; state.cfs=state.cfs.filter(c=>c.id!==el.dataset.delCf); save(KEY.CFS, state.cfs); syncToCloud(); render(); }); }); //[cite: 1]
  
  const tog=document.getElementById('toggle-sound'); if(tog) tog.addEventListener('click',()=>{ state.sound=!state.sound; save(KEY.SOUND,state.sound); render(); }); //[cite: 1]
  
  // Event control สวิตช์จอแก้ว CRT
  const togCrt=document.getElementById('toggle-crt'); if(togCrt) togCrt.addEventListener('click',()=>{ state.crt=!state.crt; save(KEY.CRT, state.crt); render(); });

  const btnEditBal=document.getElementById('btn-edit-bal'); if(btnEditBal) btnEditBal.addEventListener('click',()=>{ state.editBal=true; state.tempBal=state.balance; render(); }); //[cite: 1]
  const btnSaveBal=document.getElementById('btn-save-bal'); if(btnSaveBal) btnSaveBal.addEventListener('click',()=>{ const v=parseFloat(state.tempBal); if(!isNaN(v)&&v>=0){ state.balance=v; save(KEY.BALANCE,v); syncToCloud(); } state.editBal=false; render(); }); //[cite: 1]
  
  const btnClear=document.getElementById('btn-clear-trades'); if(btnClear) btnClear.addEventListener('click',()=>{ if(!confirm('⚠️ คำเตือนขั้นเด็ดขาด: ต้องการลบประวัติการเทรดทั้งหมดออกจากระบบจริงหรือไม่?')) return; state.trades=[]; save(KEY.TRADES,[]); syncToCloud(); render(); }); //[cite: 1]

  const btnBackup=document.getElementById('btn-backup');
  if(btnBackup) btnBackup.addEventListener('click',()=>{
    const data={ version:4, exportedAt:new Date().toISOString(), balance:state.balance, trades:state.trades, cfs:state.cfs }; //[cite: 1]
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); //[cite: 1]
    const a=document.createElement('a'); a.href=url; a.download=`rtj-arcade-backup-${today()}.json`; a.click(); URL.revokeObjectURL(url); beep('win'); //[cite: 1]
  });

  const btnImportTrigger=document.getElementById('btn-import-trigger'); if(btnImportTrigger) btnImportTrigger.addEventListener('click',()=>{ document.getElementById('btn-import')?.click(); }); //[cite: 1]

  const importInput=document.getElementById('btn-import');
  if(importInput) importInput.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); //[cite: 1]
    reader.onload=ev=>{
      try {
        const data=JSON.parse(ev.target.result); let importedTrades = []; let importedCfs = []; //[cite: 1]
        if (Array.isArray(data)) { importedTrades = data; } //[cite: 1]
        else if (data && Array.isArray(data.trades)) { //[cite: 1]
          importedTrades = data.trades; importedCfs = data.cfs || []; //[cite: 1]
          if (data.balance) { state.balance = parseFloat(data.balance) || state.balance; save(KEY.BALANCE, state.balance); } //[cite: 1]
        } else { alert('โครงสร้างข้อมูลดิสก์ไม่ถูกต้อง!'); return; } //[cite: 1]
        if(!confirm(`พบฐานข้อมูลเทรด ${importedTrades.length} ไม้\nยืนยันนำเข้าเพื่อเขียนทับระบบปัจจุบันและซิงก์คลาวด์?`)) return; //[cite: 1]
        state.trades = importedTrades; save(KEY.TRADES, state.trades); //[cite: 1]
        state.cfs = importedCfs; save(KEY.CFS, state.cfs); //[cite: 1]
        syncToCloud(); beep('win'); render(); //[cite: 1]
        alert('✅ IMPORT & CLOUD SYNC COMPLETELY!');
      } catch (err) { alert('❌ JSON Corrupted! อ่านไฟล์ล้มเหลว'); } //[cite: 1]
    }; reader.readAsText(file); e.target.value='';
  }); //[cite: 1]
}

function bindPeriodFilter(prefix, period, onChange) {
  const modeEl=document.getElementById(`${prefix}-period-mode`); if(!modeEl) return; //[cite: 1]
  modeEl.addEventListener('change',e=>{ const newP={mode:e.target.value, account: period.account}; if(e.target.value==='daily') newP.date=today(); onChange(newP); }); //[cite: 1]
  const dateEl=document.getElementById(`${prefix}-period-date`); if(dateEl) dateEl.addEventListener('change',e=>{ onChange({...period, date:e.target.value}); }); //[cite: 1]
  const fromEl=document.getElementById(`${prefix}-period-from`); if(fromEl) fromEl.addEventListener('change',e=>{ onChange({...period, from:e.target.value}); }); //[cite: 1]
  const toEl=document.getElementById(`${prefix}-period-to`); if(toEl) toEl.addEventListener('change',e=>{ onChange({...period, to:e.target.value}); }); //[cite: 1]
} //[cite: 1]

// 📡 BOOT ENGINE RUNTIME
initCloudDatabase(); //[cite: 1]
</script>
</body>
</html>
